---
name: "Quality"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call: {}
  workflow_dispatch: {}

env:
  GITHUB_COM_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

permissions:
  contents: "read"

jobs:
  ci:
    name: "Quality Checks (lint and test)"
    permissions:
      actions: "write"
      contents: "read"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - uses: "nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c" # v35
      - uses: "nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569" # v7
        with:
          primary-key: "cache-nix-store-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}"
          restore-prefixes-first-match: "cache-nix-store-${{ runner.os }}-"
          gc-max-store-size-linux: 1073741824 # 1go
          purge: true
          purge-prefixes: "cache-nix-store-${{ runner.os }}-"
          purge-created: 0
          purge-primary-key: "never"
      - uses: "cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71" # v17
        with:
          name: "krostar"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - name: "Print nix version"
        run: "nix --version"
      - name: "Print flake metadata"
        run: "nix flake metadata"
      - name: "Setup shell"
        run: "nix develop --command true"
      - name: "Just CI"
        run: "nix develop --command just ci"
